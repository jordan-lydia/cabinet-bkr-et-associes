<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet BKR & Associés · Avocats à Kolwezi</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- PDF.js -->

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<body>

<script>
    // ========== CONFIGURATION PDF.JS ==========
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    // ========== FONCTION POUR CRÉER UN PDF DE DÉMONSTRATION ==========
    async function createDemoPdf() {
        // Créer un PDF simple avec du texte
        const { PDFDocument, StandardFonts, rgb } = PDFLib;
        
        // Créer un nouveau document PDF
        const pdfDoc = await PDFDocument.create();
        const page = pdfDoc.addPage([600, 800]);
        const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
        
        // Ajouter du contenu
        page.drawText('Cabinet BKR & Associés', {
            x: 50,
            y: 750,
            size: 24,
            font: font,
            color: rgb(0.2, 0.4, 0.6)
        });
        
        page.drawText('Rapport d\'activité 2025', {
            x: 50,
            y: 700,
            size: 18,
            font: font,
            color: rgb(0.5, 0.5, 0.5)
        });
        
        page.drawText('Dossiers traités : 127', {
            x: 50,
            y: 620,
            size: 12,
            font: font
        });
        
        page.drawText('Taux de réussite : 94%', {
            x: 50,
            y: 600,
            size: 12,
            font: font
        });
        
        page.drawText('Clients satisfaits : 98%', {
            x: 50,
            y: 580,
            size: 12,
            font: font
        });
        
        // Ajouter une deuxième page
        const page2 = pdfDoc.addPage([600, 800]);
        page2.drawText('Dossiers majeurs 2025', {
            x: 50,
            y: 750,
            size: 20,
            font: font,
            color: rgb(0.2, 0.4, 0.6)
        });
        
        const cases = [
            'Affaire minière KCC vs État - Victoire',
            'Contentieux fiscal Société MKM - Transaction',
            'Conseil juridique Banque Commerciale - Contrat 25M$'
        ];
        
        cases.forEach((text, index) => {
            page2.drawText(`${index + 1}. ${text}`, {
                x: 50,
                y: 700 - (index * 30),
                size: 11,
                font: font
            });
        });
        
        // Convertir en base64
        const pdfBytes = await pdfDoc.save();
        const base64 = arrayBufferToBase64(pdfBytes);
        
        return {
            id: Date.now(),
            title: "📊 Rapport d'Activité 2025",
            description: "Bilan annuel du cabinet : 127 dossiers traités, 94% de réussite",
            dataUrl: base64,
            date: new Date().toLocaleDateString('fr-FR')
        };
    }
    
    // Helper: Convertir ArrayBuffer en base64
    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.byteLength; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary);
    }
    
    // Variables globales
    let isAdminLogged = false;
    let editMode = false;
    let pdfDocuments = [];
    let lawyers = [];
    let currentIndex = 0;
    let currentPdf = null;
    let currentPage = 1;
    let totalPages = 1;
    
    // ========== STORAGE KEYS ==========
    const STORAGE_KEYS = {
        LAWYERS: 'bkr_lawyers',
        PDFS: 'bkr_pdfs',
        SETTINGS: 'bkr_settings'
    };
    
    // ========== INITIAL DATA ==========
    const defaultLawyers = [
        {
            id: 1,
            name: "Maître Biens KITUNGWA",
            role: "Administrateur du cabinet",
            description: "Avocat au barreau du Lualaba, expert en droit minier et corporate.",
            phone: "+243 977 219 423",
            photo: "https://via.placeholder.com/400x300?text=Me+Kitungwa"
        },
        {
            id: 2,
            name: "Maître Jonathan KASHAMA",
            role: "Membre du cabinet",
            description: "Spécialiste en contentieux des affaires et droit fiscal.",
            phone: "+243 813 535 315",
            photo: "https://via.placeholder.com/400x300?text=Me+Kashama"
        },
        {
            id: 3,
            name: "Maître Jealuc KANDA",
            role: "Chargé d'exécution",
            description: "Responsable du suivi opérationnel des dossiers.",
            phone: "+243 975 886 336",
            photo: "https://via.placeholder.com/400x300?text=Me+Kanda"
        },
        {
            id: 4,
            name: "Maître Jonathan NSHIMBA",
            role: "Chargé de relations et affaires",
            description: "Gestion des partenariats et développement.",
            phone: "+243 999 816 551",
            photo: "https://via.placeholder.com/400x300?text=Me+Nshimba"
        }
    ];
    
    // ========== CHARGEMENT DES DONNÉES AVEC PDF DE DÉMO ==========
    async function loadData() {
        // Charger les avocats
        const savedLawyers = localStorage.getItem(STORAGE_KEYS.LAWYERS);
        if (savedLawyers) {
            lawyers = JSON.parse(savedLawyers);
        } else {
            lawyers = defaultLawyers;
            saveLawyers();
        }
        
        // Charger les PDFs
        const savedPdfs = localStorage.getItem(STORAGE_KEYS.PDFS);
        if (savedPdfs) {
            pdfDocuments = JSON.parse(savedPdfs);
        } else {
            // CRÉER UN PDF DE DÉMONSTRATION AUTOMATIQUEMENT
            showToast('Création du PDF de démonstration...');
            const demoPdf = await createDemoPdf();
            pdfDocuments = [demoPdf];
            savePdfs();
            showToast('PDF de démonstration ajouté avec succès !');
        }
        
        renderLawyers();
        renderCarousel();
    }
    
    // ========== FONCTIONS DE SAUVEGARDE ==========
    function saveLawyers() {
        localStorage.setItem(STORAGE_KEYS.LAWYERS, JSON.stringify(lawyers));
    }
    
    function savePdfs() {
        localStorage.setItem(STORAGE_KEYS.PDFS, JSON.stringify(pdfDocuments));
    }
    
    // ========== RENDER LAWYERS ==========
    function renderLawyers() {
        const grid = document.getElementById('lawyersGrid');
        if (!grid) return;
        
        grid.innerHTML = '';
        lawyers.forEach(lawyer => {
            const card = document.createElement('div');
            card.className = 'lawyer-card';
            card.setAttribute('data-id', lawyer.id);
            card.innerHTML = `
                <div class="lawyer-photo" style="background-image: url('${lawyer.photo}'); background-size: cover; background-position: center;">
                    <div class="photo-overlay">${lawyer.name}</div>
                </div>
                <div class="info">
                    <h4>${lawyer.name}</h4>
                    <div class="role">${lawyer.role}</div>
                    <p>${lawyer.description}</p>
                    <div class="contact-l"><i class="fas fa-phone"></i> ${lawyer.phone}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    // ========== RENDER CAROUSEL ==========
    function renderCarousel() {
        const track = document.getElementById('carouselTrack');
        const dotsContainer = document.getElementById('carouselDots');
        if (!track) return;
        
        track.innerHTML = '';
        dotsContainer.innerHTML = '';
        
        if (pdfDocuments.length === 0) {
            track.innerHTML = `
                <div class="carousel-slide">
                    <div class="pdf-preview" style="cursor: default;">
                        <i class="fas fa-folder-open" style="font-size: 5rem;"></i>
                        <h3>Aucun dossier</h3>
                        <p>Connectez-vous en tant qu'admin pour ajouter des documents</p>
                    </div>
                </div>
            `;
            return;
        }
        
        pdfDocuments.forEach((doc, index) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide';
            slide.innerHTML = `
                <div class="pdf-preview" onclick="openPdf(${index})">
                    <i class="fas fa-file-pdf"></i>
                    <h3>${escapeHtml(doc.title)}</h3>
                    <p>${escapeHtml(doc.description)}</p>
                    <p style="margin-top: 1rem; font-size: 0.9rem;"><i class="fas fa-calendar"></i> ${doc.date || new Date().toLocaleDateString()}</p>
                </div>
                <div class="carousel-caption">
                    <h3>${escapeHtml(doc.title)}</h3>
                    <p>${escapeHtml(doc.description)}</p>
                </div>
            `;
            track.appendChild(slide);
            
            const dot = document.createElement('div');
            dot.className = 'carousel-dot' + (index === 0 ? ' active' : '');
            dot.onclick = () => goToSlide(index);
            dotsContainer.appendChild(dot);
        });
        
        currentIndex = 0;
        updateCarouselPosition();
    }
    
    function updateCarouselPosition() {
        const track = document.getElementById('carouselTrack');
        if (track && pdfDocuments.length > 0) {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            const dots = document.querySelectorAll('.carousel-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        }
    }
    
    function goToSlide(index) {
        if (pdfDocuments.length > 0 && index >= 0 && index < pdfDocuments.length) {
            currentIndex = index;
            updateCarouselPosition();
        }
    }
    
    function nextSlide() {
        if (pdfDocuments.length > 0) {
            currentIndex = (currentIndex + 1) % pdfDocuments.length;
            updateCarouselPosition();
        }
    }
    
    function prevSlide() {
        if (pdfDocuments.length > 0) {
            currentIndex = (currentIndex - 1 + pdfDocuments.length) % pdfDocuments.length;
            updateCarouselPosition();
        }
    }
    
    // ========== FONCTIONS PDF ==========
    function base64ToArrayBuffer(base64) {
        const binaryString = atob(base64);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }
    
    async function openPdf(index) {
        const doc = pdfDocuments[index];
        if (!doc || !doc.dataUrl) {
            alert('Document non disponible');
            return;
        }
        
        const modal = document.getElementById('pdfModal');
        const title = document.getElementById('pdfModalTitle');
        const viewer = document.getElementById('pdfViewer');
        const downloadBtn = document.getElementById('pdfDownloadBtn');
        
        title.textContent = doc.title;
        modal.classList.add('active');
        viewer.innerHTML = '';
        
        try {
            const loadingTask = pdfjsLib.getDocument({ data: base64ToArrayBuffer(doc.dataUrl) });
            currentPdf = await loadingTask.promise;
            totalPages = currentPdf.numPages;
            currentPage = 1;
            document.getElementById('pdfPageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
            renderPdfPage(currentPage);
            
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = `data:application/pdf;base64,${doc.dataUrl}`;
                a.download = `${doc.title}.pdf`;
                a.click();
            };
        } catch (error) {
            console.error('Erreur PDF:', error);
            viewer.innerHTML = '<p style="color: white; padding: 2rem;">Erreur de chargement du PDF</p>';
        }
    }
    
    async function renderPdfPage(pageNumber) {
        if (!currentPdf) return;
        
        const viewer = document.getElementById('pdfViewer');
        const page = await currentPdf.getPage(pageNumber);
        const containerWidth = viewer.clientWidth - 40;
        const viewport = page.getViewport({ scale: 1 });
        const scale = containerWidth / viewport.width;
        const scaledViewport = page.getViewport({ scale });
        
        const canvas = document.createElement('canvas');
        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;
        const context = canvas.getContext('2d');
        
        viewer.innerHTML = '';
        viewer.appendChild(canvas);
        
        await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
    }
    
    // ========== FONCTIONS ADMIN ==========
    function toggleAdminLogin() {
        if (!isAdminLogged) {
            document.getElementById('adminModal').classList.add('active');
        } else {
            logoutAdmin();
        }
    }
    
    function logoutAdmin() {
        isAdminLogged = false;
        editMode = false;
        document.body.classList.remove('admin-mode');
        document.getElementById('adminBadge').innerHTML = '<i class="fas fa-lock"></i><span>Admin</span>';
        document.getElementById('adminBadge').classList.remove('logged');
        showToast('Déconnexion réussie');
    }
    
    function checkAdminPassword() {
        const password = document.getElementById('adminPassword').value;
        if (password === 'admin123') {
            isAdminLogged = true;
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('adminBadge').innerHTML = '<i class="fas fa-lock-open"></i><span>Admin connecté</span>';
            document.getElementById('adminBadge').classList.add('logged');
            showToast('Connexion réussie');
            toggleAdminPanel();
        } else {
            alert('Mot de passe incorrect');
        }
    }
    
    function toggleAdminPanel() {
        if (isAdminLogged) {
            document.getElementById('adminPanel').classList.toggle('active');
        }
    }
    
    function enableEditMode() {
        if (!isAdminLogged) return;
        editMode = !editMode;
        if (editMode) {
            document.body.classList.add('admin-mode');
            makeElementsEditable();
            showToast('Mode édition activé - Double-cliquez sur les textes');
        } else {
            document.body.classList.remove('admin-mode');
            removeEditable();
            showToast('Mode édition désactivé');
        }
    }
    
    function makeElementsEditable() {
        const editableElements = document.querySelectorAll('h1, h2, h3, h4, p, .logo-text, .role, .card p, .stat-item p, .stat-item h3, .info-line span, .contact-info p, footer p');
        editableElements.forEach(el => {
            if (!el.hasAttribute('data-original')) {
                el.setAttribute('data-original', el.innerHTML);
            }
            el.setAttribute('contenteditable', 'true');
            el.setAttribute('ondblclick', 'editText(this)');
        });
    }
    
    function removeEditable() {
        const editableElements = document.querySelectorAll('[contenteditable="true"]');
        editableElements.forEach(el => {
            el.removeAttribute('contenteditable');
            el.removeAttribute('ondblclick');
        });
    }
    
    function editText(element) {
        if (!editMode || !isAdminLogged) return;
        const newText = prompt('Modifier le texte:', element.innerText);
        if (newText !== null && newText.trim() !== '') {
            element.innerText = newText;
        }
    }
    
    function saveAllChanges() {
        if (!isAdminLogged) return;
        
        const settings = {
            texts: {},
            heroImage: document.getElementById('hero')?.style.backgroundImage,
            logoImage: document.getElementById('logo')?.src
        };
        
        document.querySelectorAll('[contenteditable="true"]').forEach(el => {
            if (el.id) settings.texts[el.id] = el.innerText;
        });
        
        localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
        showToast('Modifications sauvegardées');
    }
    
    function showAddLawyerForm() {
        if (!isAdminLogged) return;
        
        const name = prompt('Nom complet de l\'avocat:');
        if (!name) return;
        
        const role = prompt('Fonction:');
        if (!role) return;
        
        const description = prompt('Description:');
        const phone = prompt('Téléphone:');
        
        const photoInput = document.createElement('input');
        photoInput.type = 'file';
        photoInput.accept = 'image/*';
        photoInput.onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const newLawyer = {
                    id: Date.now(),
                    name: name,
                    role: role,
                    description: description || '',
                    phone: phone || '',
                    photo: event.target.result
                };
                lawyers.push(newLawyer);
                saveLawyers();
                renderLawyers();
                showToast('Avocat ajouté avec succès');
            };
            reader.readAsDataURL(file);
        };
        photoInput.click();
    }
    
    function reorderLawyers() {
        if (!isAdminLogged) return;
        
        new Sortable(document.getElementById('lawyersGrid'), {
            animation: 150,
            onEnd: function() {
                const newOrder = [];
                document.querySelectorAll('#lawyersGrid .lawyer-card').forEach(card => {
                    const id = parseInt(card.getAttribute('data-id'));
                    const lawyer = lawyers.find(l => l.id === id);
                    if (lawyer) newOrder.push(lawyer);
                });
                if (newOrder.length === lawyers.length) {
                    lawyers = newOrder;
                    saveLawyers();
                    showToast('Ordre sauvegardé');
                }
            }
        });
        showToast('Déplacez les avocats pour réorganiser');
    }
    
    function showPdfUploadForm() {
        if (!isAdminLogged) return;
        
        const title = prompt('Titre du document:');
        if (!title) return;
        
        const description = prompt('Description:');
        if (!description) return;
        
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.pdf';
        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64 = event.target.result.split(',')[1];
                const newDoc = {
                    id: Date.now(),
                    title: title,
                    description: description,
                    dataUrl: base64,
                    date: new Date().toLocaleDateString('fr-FR')
                };
                pdfDocuments.push(newDoc);
                savePdfs();
                renderCarousel();
                showToast('Document publié avec succès');
            };
            reader.readAsDataURL(file);
        };
        fileInput.click();
    }
    
    function clearAllDocuments() {
        if (!isAdminLogged) return;
        if (confirm('Supprimer tous les dossiers ?')) {
            pdfDocuments = [];
            savePdfs();
            renderCarousel();
            showToast('Tous les dossiers supprimés');
        }
    }
    
    function changeLogo(input) {
        if (!isAdminLogged) return;
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('logo').src = e.target.result;
            showToast('Logo modifié');
        };
        reader.readAsDataURL(file);
    }
    
    function changeHeroImage(input) {
        if (!isAdminLogged) return;
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('hero').style.backgroundImage = `url('${e.target.result}')`;
            showToast('Image modifiée');
        };
        reader.readAsDataURL(file);
    }
    
    function changePrimaryColor(color) {
        document.querySelectorAll('.btn, .rdv-btn a, .carousel-dot.active, .admin-panel-btn:not(.danger)').forEach(el => {
            if (el.style) el.style.backgroundColor = color;
        });
    }
    
    function changeSecondaryColor(color) {
        document.querySelectorAll('nav, .stats-container').forEach(el => {
            if (el.style) el.style.backgroundColor = color;
        });
    }
    
    function exportAllData() {
        const exportData = {
            lawyers: lawyers,
            pdfs: pdfDocuments,
            version: '1.0',
            exportDate: new Date().toISOString()
        };
        
        const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bkr_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Données exportées');
    }
    
    function importAllData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.lawyers) {
                    lawyers = data.lawyers;
                    saveLawyers();
                    renderLawyers();
                }
                if (data.pdfs) {
                    pdfDocuments = data.pdfs;
                    savePdfs();
                    renderCarousel();
                }
                showToast('Importation réussie');
            } catch (error) {
                alert('Erreur lors de l\'importation');
            }
        };
        reader.readAsText(file);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // ========== INITIALISATION ==========
    window.onload = async function() {
        // Charger la bibliothèque PDF-lib pour créer le PDF de démo
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js';
        script.onload = async () => {
            window.PDFLib = PDFLib;
            await loadData();
        };
        document.head.appendChild(script);
    };
    
    // ========== ÉVÉNEMENTS ==========
    document.getElementById('menuToggle')?.addEventListener('click', () => {
        document.getElementById('navLinks')?.classList.toggle('active');
    });
    
    document.getElementById('openRdv')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('rdvModal').classList.add('active');
    });
    
    document.getElementById('heroRdvBtn')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('rdvModal').classList.add('active');
    });
    
    document.getElementById('contactRdvBtn')?.addEventListener('click', () => {
        document.getElementById('rdvModal').classList.add('active');
    });
    
    document.getElementById('closeModal')?.addEventListener('click', () => {
        document.getElementById('rdvModal').classList.remove('active');
    });
    
    document.getElementById('closePdfModal')?.addEventListener('click', () => {
        document.getElementById('pdfModal').classList.remove('active');
        currentPdf = null;
    });
    
    document.getElementById('pdfPrevPage')?.addEventListener('click', () => {
        if (currentPdf && currentPage > 1) {
            currentPage--;
            renderPdfPage(currentPage);
            document.getElementById('pdfPageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
        }
    });
    
    document.getElementById('pdfNextPage')?.addEventListener('click', () => {
        if (currentPdf && currentPage < totalPages) {
            currentPage++;
            renderPdfPage(currentPage);
            document.getElementById('pdfPageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
        }
    });
    
    document.getElementById('nextBtn')?.addEventListener('click', nextSlide);
    document.getElementById('prevBtn')?.addEventListener('click', prevSlide);
    
    document.getElementById('rdvForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Demande envoyée ! Nous vous contacterons.');
        document.getElementById('rdvModal').classList.remove('active');
        e.target.reset();
    });
    
    // Smooth scroll
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            if (this.getAttribute('href') !== '#') {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) target.scrollIntoView({behavior: 'smooth'});
            }
        });
    });
    
    // Auto-slide carousel
    setInterval(() => {
        if (pdfDocuments.length > 0) nextSlide();
    }, 5000);
</script>
</body>
</html>
